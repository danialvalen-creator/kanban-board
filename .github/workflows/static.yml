name: Deploy static content to Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      # 1. Устанавливаем Node.js (версию можно поменять под ваш проект)
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20' # или 18, зависит от вашего проекта
          cache: 'npm' # кеширует зависимости для ускорения

      # 2. Устанавливаем зависимости (npm ci быстрее и строже, чем npm install)
      - name: Install dependencies
        run: npm ci

      # 3. Запускаем сборку. Vite/CRA создадут папку dist (или build)
      - name: Build project
        run: npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v5

      # 4. ВАЖНО: Загружаем не всё подряд, а только папку со сборкой!
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist' # или './build', если у вас Create React App

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
